version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: kmc-mongodb
    environment:
      MONGO_INITDB_DATABASE: KMCEventPlatformDb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kmc-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: kmc-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDbSettings__ConnectionString: mongodb://mongodb:27017
      MongoDbSettings__DatabaseName: KMCEventPlatformDb
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - kmc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mongodb_data:

networks:
  kmc-network:
    driver: bridge
